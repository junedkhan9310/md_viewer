<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Viewer</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <!-- marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- html2pdf.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* ═══════════════════════════════════════
       DESIGN TOKENS — One Piece palette
    ═══════════════════════════════════════ */
    :root {
      /* Brand */
      --red:        #e63946;
      --gold:       #f4a261;
      --ocean:      #1d3557;
      --ocean-mid:  #457b9d;
      --ocean-pale: #a8dadc;

      /* Light theme */
      --bg:         #f8f5f0;
      --surface:    #ffffff;
      --surface-2:  #f1ede6;
      --border:     #e2d9cc;
      --text:       #1a1208;
      --text-2:     #6b5f50;
      --shadow:     rgba(29,53,87,0.10);
      --shadow-lg:  rgba(29,53,87,0.18);
      --accent:     var(--red);
      --accent-2:   var(--gold);
      --header-bg:  var(--ocean);
      --header-text:#ffffff;
      --scrollbar:  #ccc;
      --editor-bg:  #fdfaf6;
      --line-num:   #bdb5a8;
      --resize-bg:  #e2d9cc;
    }

    [data-theme="dark"] {
      --bg:         #0d1b2a;
      --surface:    #132236;
      --surface-2:  #1a2e47;
      --border:     #243d56;
      --text:       #eae6df;
      --text-2:     #9badc0;
      --shadow:     rgba(0,0,0,0.30);
      --shadow-lg:  rgba(0,0,0,0.50);
      --header-bg:  #09131e;
      --header-text:#eae6df;
      --scrollbar:  #2a4060;
      --editor-bg:  #0f1e30;
      --line-num:   #3a5470;
      --resize-bg:  #1a2e47;
    }

    /* ═══════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    /* ═══════════════════════════════════════
       HEADER
    ═══════════════════════════════════════ */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--header-bg);
      color: var(--header-text);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      box-shadow: 0 2px 12px var(--shadow-lg);
      flex-shrink: 0;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--red);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
      box-shadow: 0 0 0 2px var(--gold);
    }

    .app-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      white-space: nowrap;
      color: #fff;
    }

    .app-title span {
      color: var(--gold);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      transition: all 0.18s ease;
      white-space: nowrap;
    }

    .btn-ghost {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
    }

    .btn-gold {
      background: var(--gold);
      color: #1a1208;
      border: 1px solid transparent;
    }
    .btn-gold:hover {
      background: #e8924e;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(244,162,97,0.4);
    }

    .btn-red {
      background: var(--red);
      color: #fff;
      border: 1px solid transparent;
    }
    .btn-red:hover {
      background: #c62e3b;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(230,57,70,0.4);
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 0.78rem;
    }

    .btn svg { flex-shrink: 0; }

    /* Dark mode toggle — icon swap */
    #darkToggle .icon-moon  { display: inline; }
    #darkToggle .icon-sun   { display: none; }
    [data-theme="dark"] #darkToggle .icon-moon { display: none; }
    [data-theme="dark"] #darkToggle .icon-sun  { display: inline; }

    /* ═══════════════════════════════════════
       TOOLBAR (below header)
    ═══════════════════════════════════════ */
    .toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .toolbar-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }

    .tbtn {
      background: none;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      color: var(--text-2);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .tbtn:hover {
      background: var(--surface-2);
      border-color: var(--border);
      color: var(--text);
    }
    .tbtn-bold  { font-weight: 700; }
    .tbtn-italic { font-style: italic; }

    .toolbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .char-count {
      font-size: 0.73rem;
      color: var(--text-2);
      font-family: 'DM Mono', monospace;
    }

    /* ═══════════════════════════════════════
       MAIN LAYOUT
    ═══════════════════════════════════════ */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .pane-header {
      padding: 8px 16px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      font-size: 0.73rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-2);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .pane-header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* Resize handle */
    .resize-handle {
      width: 5px;
      background: var(--resize-bg);
      cursor: col-resize;
      flex-shrink: 0;
      position: relative;
      transition: background 0.2s;
    }
    .resize-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 3px;
      height: 32px;
      border-radius: 2px;
      background: var(--ocean-mid);
      opacity: 0.4;
    }
    .resize-handle:hover, .resize-handle.dragging {
      background: var(--ocean-pale);
    }

    /* ═══════════════════════════════════════
       EDITOR PANE
    ═══════════════════════════════════════ */
    .editor-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #editor {
      width: 100%;
      height: 100%;
      resize: none;
      border: none;
      outline: none;
      background: var(--editor-bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.875rem;
      line-height: 1.7;
      padding: 20px 20px 20px 20px;
      tab-size: 2;
      transition: background 0.3s, color 0.3s;
      overflow: auto;
    }

    #editor::placeholder { color: var(--line-num); }

    /* ═══════════════════════════════════════
       PREVIEW PANE
    ═══════════════════════════════════════ */
    .preview-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      background: var(--surface);
      transition: background 0.3s;
    }

    /* ─── Rendered Markdown styles ─── */
    #preview {
      max-width: 800px;
      margin: 0 auto;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--text);
    }

    #preview h1, #preview h2, #preview h3,
    #preview h4, #preview h5, #preview h6 {
      font-family: 'Playfair Display', serif;
      margin-top: 1.6em;
      margin-bottom: 0.5em;
      line-height: 1.25;
      color: var(--text);
    }

    #preview h1 {
      font-size: 2rem;
      border-bottom: 3px solid var(--red);
      padding-bottom: 0.3em;
    }
    #preview h2 {
      font-size: 1.55rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.2em;
    }
    #preview h3 { font-size: 1.25rem; color: var(--ocean-mid); }
    #preview h4 { font-size: 1.05rem; }

    #preview p { margin: 0.75em 0; }

    #preview a { color: var(--ocean-mid); text-underline-offset: 3px; }
    [data-theme="dark"] #preview a { color: var(--ocean-pale); }

    #preview strong { font-weight: 700; color: var(--text); }
    #preview em { font-style: italic; color: var(--text-2); }

    #preview ul, #preview ol {
      padding-left: 1.5em;
      margin: 0.6em 0;
    }
    #preview li { margin: 0.3em 0; }
    #preview li::marker { color: var(--red); }

    #preview blockquote {
      border-left: 4px solid var(--gold);
      margin: 1em 0;
      padding: 0.5em 1em;
      background: var(--surface-2);
      border-radius: 0 8px 8px 0;
      color: var(--text-2);
      font-style: italic;
    }

    #preview hr {
      border: none;
      border-top: 2px solid var(--border);
      margin: 1.5em 0;
    }

    /* Code */
    #preview code {
      font-family: 'DM Mono', monospace;
      font-size: 0.82em;
      background: var(--surface-2);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      color: var(--red);
    }

    #preview pre {
      margin: 1em 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow);
    }

    #preview pre code {
      background: none;
      color: inherit;
      padding: 0;
      font-size: 0.845rem;
      display: block;
    }

    .hljs { padding: 16px 20px !important; }

    /* Pre with label */
    .code-block-wrap {
      position: relative;
    }

    .code-lang-label {
      position: absolute;
      top: 0; right: 0;
      background: var(--ocean);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 0 9px 0 6px;
      letter-spacing: 0.05em;
      opacity: 0.8;
      pointer-events: none;
    }

    /* Tables */
    #preview table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      font-size: 0.9rem;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px var(--shadow);
    }

    #preview thead tr {
      background: var(--ocean);
      color: #fff;
    }

    #preview th, #preview td {
      padding: 10px 14px;
      text-align: left;
    }

    #preview tbody tr:nth-child(odd)  { background: var(--surface); }
    #preview tbody tr:nth-child(even) { background: var(--surface-2); }
    #preview tbody tr:hover           { background: rgba(69,123,157,0.1); }

    /* Images */
    #preview img {
      max-width: 100%;
      border-radius: 8px;
      box-shadow: 0 2px 12px var(--shadow);
      margin: 0.5em 0;
    }

    /* Task lists */
    #preview input[type="checkbox"] {
      accent-color: var(--red);
      margin-right: 6px;
    }

    /* ═══════════════════════════════════════
       STATUS BAR
    ═══════════════════════════════════════ */
    .status-bar {
      height: 26px;
      background: var(--ocean);
      color: rgba(255,255,255,0.65);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      font-size: 0.72rem;
      font-family: 'DM Mono', monospace;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }
    .status-bar span { white-space: nowrap; }
    .status-sep { color: rgba(255,255,255,0.25); }

    /* Saved indicator */
    .saved-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
      color: rgba(168,218,220,0.8);
      transition: opacity 0.4s;
    }
    .saved-pill.hidden { opacity: 0; }
    .saved-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--ocean-pale);
    }

    /* ═══════════════════════════════════════
       TOAST
    ═══════════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ocean);
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 4px 20px var(--shadow-lg);
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ═══════════════════════════════════════
       EXPORT OVERLAY
    ═══════════════════════════════════════ */
    #exportOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    #exportOverlay.active { display: flex; }
    .export-box {
      background: var(--surface);
      border-radius: 14px;
      padding: 28px 32px;
      text-align: center;
      box-shadow: 0 16px 40px var(--shadow-lg);
      border: 1px solid var(--border);
    }
    .export-box h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--text);
      margin-bottom: 6px;
    }
    .export-box p { color: var(--text-2); font-size: 0.85rem; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════ */
    @media (max-width: 720px) {
      main { flex-direction: column; }
      .resize-handle { display: none; }
      .pane { flex: unset; height: 50dvh; }
      .pane.editor-pane { border-bottom: 2px solid var(--border); }
      .app-title { font-size: 1rem; }
      .btn span { display: none; }
      .btn { padding: 7px 10px; }
    }

    @media (max-width: 480px) {
      .toolbar { gap: 2px; padding: 5px 10px; }
      #editor { padding: 14px; font-size: 0.82rem; }
      .preview-wrap { padding: 16px; }
    }

    /* ═══════════════════════════════════════
       WELCOME PLACEHOLDER
    ═══════════════════════════════════════ */
    .preview-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--text-2);
      font-family: 'Playfair Display', serif;
      text-align: center;
      padding: 40px;
    }
    .preview-empty .big { font-size: 3rem; line-height: 1; }
    .preview-empty .sub { font-size: 1.1rem; color: var(--text-2); font-style: italic; }
    .preview-empty .hint { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--line-num); margin-top: 4px; }

  </style>
</head>

<body>

  <!-- ═══ HEADER ═══ -->
  <header>
    <div class="header-left">
      <div class="logo-icon">⚓</div>
      <span class="app-title">Markdown <span>Viewer</span></span>
    </div>
    <div class="header-right">
      <!-- Extra tools -->
      <button class="btn btn-ghost btn-sm" id="copyHtmlBtn" title="Copy rendered HTML">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        <span>Copy HTML</span>
      </button>
      <button class="btn btn-ghost btn-sm" id="downloadMdBtn" title="Download .md file">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>.md</span>
      </button>
      <button class="btn btn-ghost btn-sm" id="darkToggle" title="Toggle dark mode">
        <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <svg class="icon-sun"  width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <span>Theme</span>
      </button>
      <button class="btn btn-gold" id="exportPdfBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Export PDF</span>
      </button>
    </div>
  </header>

  <!-- ═══ TOOLBAR ═══ -->
  <div class="toolbar">
    <button class="tbtn tbtn-bold"   data-wrap="**"  data-title="Bold">B</button>
    <button class="tbtn tbtn-italic" data-wrap="*"   data-title="Italic">I</button>
    <button class="tbtn" data-wrap="~~" data-title="Strikethrough"><s>S</s></button>
    <div class="toolbar-sep"></div>
    <button class="tbtn" data-prefix="# "   data-title="H1">H1</button>
    <button class="tbtn" data-prefix="## "  data-title="H2">H2</button>
    <button class="tbtn" data-prefix="### " data-title="H3">H3</button>
    <div class="toolbar-sep"></div>
    <button class="tbtn" data-prefix="- "   data-title="Bullet list">• List</button>
    <button class="tbtn" data-prefix="1. "  data-title="Numbered list"># List</button>
    <button class="tbtn" data-prefix="> "   data-title="Blockquote">❝ Quote</button>
    <div class="toolbar-sep"></div>
    <button class="tbtn" data-snippet="```\n\n```" data-title="Code block">{ }</button>
    <button class="tbtn" data-snippet="| Col 1 | Col 2 | Col 3 |\n|-------|-------|-------|\n| A     | B     | C     |" data-title="Table">⊞ Table</button>
    <button class="tbtn" data-snippet="---" data-title="Horizontal rule">― HR</button>
    <div class="toolbar-sep"></div>
    <button class="tbtn" data-snippet="[text](url)" data-title="Link">🔗 Link</button>
    <button class="tbtn" data-snippet="![alt](url)" data-title="Image">🖼 Img</button>
    <div class="toolbar-right">
      <button class="tbtn" id="clearBtn" title="Clear editor">✕ Clear</button>
      <span class="char-count" id="charCount">0 chars</span>
    </div>
  </div>

  <!-- ═══ MAIN ═══ -->
  <main id="mainLayout">

    <!-- Editor Pane -->
    <div class="pane editor-pane" id="editorPane">
      <div class="pane-header">
        <div class="dot"></div>
        EDITOR
      </div>
      <div class="editor-wrap">
        <textarea id="editor" spellcheck="false"
          placeholder="# Start writing Markdown here…

Type and watch the preview update in real time.

**Bold**, *italic*, ~~strikethrough~~, `inline code`

## Tables, code blocks, lists — all supported!"></textarea>
      </div>
    </div>

    <!-- Resize Handle -->
    <div class="resize-handle" id="resizeHandle"></div>

    <!-- Preview Pane -->
    <div class="pane preview-pane" id="previewPane">
      <div class="pane-header">
        <div class="dot" style="background:var(--gold)"></div>
        PREVIEW
        <span id="syncScrollLabel" style="margin-left:auto;font-size:0.68rem;cursor:pointer;user-select:none;" title="Toggle sync scroll">⇅ sync</span>
      </div>
      <div class="preview-wrap" id="previewWrap">
        <div id="preview">
          <div class="preview-empty">
            <div class="big">⚓</div>
            <div class="sub">Your preview will appear here</div>
            <div class="hint">Start typing in the editor →</div>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- ═══ STATUS BAR ═══ -->
  <div class="status-bar">
    <span id="wordCount">0 words</span>
    <span class="status-sep">|</span>
    <span id="lineCount">0 lines</span>
    <span class="status-sep">|</span>
    <span id="readTime">~0 min read</span>
    <div class="saved-pill hidden" id="savedPill">
      <div class="saved-dot"></div>
      Saved
    </div>
  </div>

  <!-- ═══ EXPORT OVERLAY ═══ -->
  <div id="exportOverlay">
    <div class="export-box">
      <h3>Exporting PDF…</h3>
      <p>Rendering your preview, please wait.</p>
      <div class="spinner"></div>
    </div>
  </div>

  <!-- ═══ TOAST ═══ -->
  <div id="toast"></div>


  <script>
  (() => {
    /* ─── Elements ─── */
    const editor        = document.getElementById('editor');
    const preview       = document.getElementById('preview');
    const previewWrap   = document.getElementById('previewWrap');
    const charCount     = document.getElementById('charCount');
    const wordCount     = document.getElementById('wordCount');
    const lineCount     = document.getElementById('lineCount');
    const readTime      = document.getElementById('readTime');
    const savedPill     = document.getElementById('savedPill');
    const darkToggle    = document.getElementById('darkToggle');
    const exportPdfBtn  = document.getElementById('exportPdfBtn');
    const copyHtmlBtn   = document.getElementById('copyHtmlBtn');
    const downloadMdBtn = document.getElementById('downloadMdBtn');
    const clearBtn      = document.getElementById('clearBtn');
    const exportOverlay = document.getElementById('exportOverlay');
    const resizeHandle  = document.getElementById('resizeHandle');
    const editorPane    = document.getElementById('editorPane');
    const previewPane   = document.getElementById('previewPane');
    const syncScrollLbl = document.getElementById('syncScrollLabel');
    const toast         = document.getElementById('toast');
    const hlLightCSS    = document.getElementById('hljs-light');
    const hlDarkCSS     = document.getElementById('hljs-dark');

    /* ─── marked.js config ─── */
    marked.setOptions({
      breaks: true,
      gfm: true,
      langPrefix: 'language-',
    });

    // Custom renderer to add code-block wrapper + lang label
    const renderer = new marked.Renderer();
    renderer.code = (code, lang) => {
      const validLang = lang && hljs.getLanguage(lang) ? lang : 'plaintext';
      const highlighted = hljs.highlight(code, { language: validLang }).value;
      return `<div class="code-block-wrap">
        <pre><code class="hljs language-${validLang}">${highlighted}</code></pre>
        ${lang ? `<span class="code-lang-label">${lang}</span>` : ''}
      </div>`;
    };
    marked.setOptions({ renderer });

    /* ─── Theme ─── */
    let isDark = localStorage.getItem('md-theme') === 'dark';
    applyTheme(isDark);

    function applyTheme(dark) {
      isDark = dark;
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      hlLightCSS.disabled = dark;
      hlDarkCSS.disabled  = !dark;
      localStorage.setItem('md-theme', dark ? 'dark' : 'light');
    }

    darkToggle.addEventListener('click', () => applyTheme(!isDark));

    /* ─── Auto-save & restore ─── */
    const STORAGE_KEY = 'md-viewer-content';
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved !== null) {
      editor.value = saved;
    } else {
      editor.value = defaultContent();
    }
    renderPreview();

    let saveTimer = null;
    function scheduleSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        localStorage.setItem(STORAGE_KEY, editor.value);
        showSavedPill();
      }, 600);
    }

    function showSavedPill() {
      savedPill.classList.remove('hidden');
      setTimeout(() => savedPill.classList.add('hidden'), 2000);
    }

    /* ─── Live render ─── */
    editor.addEventListener('input', () => {
      renderPreview();
      updateStats();
      scheduleSave();
    });

    function renderPreview() {
      const md = editor.value.trim();
      if (!md) {
        preview.innerHTML = `<div class="preview-empty">
          <div class="big">⚓</div>
          <div class="sub">Your preview will appear here</div>
          <div class="hint">Start typing in the editor →</div>
        </div>`;
        return;
      }
      preview.innerHTML = marked.parse(md);
    }

    /* ─── Stats ─── */
    function updateStats() {
      const text  = editor.value;
      const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
      const lines = text === '' ? 0 : text.split('\n').length;
      const chars = text.length;
      const mins  = Math.max(1, Math.ceil(words / 200));
      charCount.textContent = `${chars.toLocaleString()} char${chars !== 1 ? 's' : ''}`;
      wordCount.textContent = `${words.toLocaleString()} word${words !== 1 ? 's' : ''}`;
      lineCount.textContent = `${lines} line${lines !== 1 ? 's' : ''}`;
      readTime.textContent  = `~${mins} min read`;
    }
    updateStats();

    /* ─── Toolbar ─── */
    document.querySelector('.toolbar').addEventListener('click', e => {
      const btn = e.target.closest('[data-wrap],[data-prefix],[data-snippet]');
      if (!btn) return;

      editor.focus();
      const start = editor.selectionStart;
      const end   = editor.selectionEnd;
      const val   = editor.value;
      let   newVal, cursor;

      if (btn.dataset.wrap) {
        const w = btn.dataset.wrap;
        const sel = val.slice(start, end) || 'text';
        newVal = val.slice(0, start) + w + sel + w + val.slice(end);
        cursor = start + w.length + sel.length + w.length;
      } else if (btn.dataset.prefix) {
        const p = btn.dataset.prefix;
        const lineStart = val.lastIndexOf('\n', start - 1) + 1;
        newVal = val.slice(0, lineStart) + p + val.slice(lineStart);
        cursor = start + p.length;
      } else if (btn.dataset.snippet) {
        const s = btn.dataset.snippet;
        newVal = val.slice(0, start) + '\n' + s + '\n' + val.slice(end);
        cursor = start + 1 + s.length + 1;
      }

      editor.value = newVal;
      editor.selectionStart = editor.selectionEnd = cursor;
      editor.dispatchEvent(new Event('input'));
    });

    /* Tab key in editor */
    editor.addEventListener('keydown', e => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = editor.selectionStart;
        editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(editor.selectionEnd);
        editor.selectionStart = editor.selectionEnd = s + 2;
      }
    });

    /* ─── Clear ─── */
    clearBtn.addEventListener('click', () => {
      if (!editor.value || confirm('Clear the editor? This cannot be undone.')) {
        editor.value = '';
        editor.dispatchEvent(new Event('input'));
      }
    });

    /* ─── Copy HTML ─── */
    copyHtmlBtn.addEventListener('click', () => {
      const html = preview.innerHTML;
      navigator.clipboard.writeText(html).then(() => showToast('HTML copied to clipboard!'));
    });

    /* ─── Download .md ─── */
    downloadMdBtn.addEventListener('click', () => {
      const blob = new Blob([editor.value], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'document.md';
      a.click();
      URL.revokeObjectURL(a.href);
      showToast('Downloaded document.md');
    });

    /* ─── Export PDF ─── */
    exportPdfBtn.addEventListener('click', async () => {
      if (!editor.value.trim()) { showToast('Nothing to export!'); return; }
      exportOverlay.classList.add('active');

      // Clone preview for PDF (clean, no empty-state)
      const clone = preview.cloneNode(true);
      clone.style.cssText = `
        padding: 20px; max-width: 100%;
        font-family: Georgia, serif;
        color: #111; background: #fff;
      `;

      // Remove empty-state if present
      const emptyState = clone.querySelector('.preview-empty');
      if (emptyState) emptyState.remove();

      const opt = {
        margin:      [10, 10, 10, 10],
        filename:    'markdown-export.pdf',
        image:       { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
        jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak:   { mode: ['avoid-all', 'css'] },
      };

      try {
        await html2pdf().set(opt).from(clone).save();
        showToast('PDF exported successfully!');
      } catch (err) {
        showToast('Export failed. Try again.');
        console.error(err);
      } finally {
        exportOverlay.classList.remove('active');
      }
    });

    /* ─── Sync scroll ─── */
    let syncScroll = true;
    syncScrollLbl.addEventListener('click', () => {
      syncScroll = !syncScroll;
      syncScrollLbl.style.color = syncScroll ? '' : 'var(--red)';
      syncScrollLbl.textContent = syncScroll ? '⇅ sync' : '⇅ off';
      showToast(syncScroll ? 'Sync scroll ON' : 'Sync scroll OFF');
    });

    editor.addEventListener('scroll', () => {
      if (!syncScroll) return;
      const ratio = editor.scrollTop / (editor.scrollHeight - editor.clientHeight || 1);
      previewWrap.scrollTop = ratio * (previewWrap.scrollHeight - previewWrap.clientHeight);
    });

    /* ─── Resize handle ─── */
    let isResizing = false;
    resizeHandle.addEventListener('mousedown', e => {
      isResizing = true;
      resizeHandle.classList.add('dragging');
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!isResizing) return;
      const main   = document.getElementById('mainLayout');
      const rect   = main.getBoundingClientRect();
      const offset = e.clientX - rect.left;
      const total  = rect.width - 5; // subtract handle width
      const leftPct  = Math.max(20, Math.min(80, (offset / total) * 100));
      const rightPct = 100 - leftPct;
      editorPane.style.flex  = `0 0 ${leftPct}%`;
      previewPane.style.flex = `0 0 ${rightPct}%`;
    });
    document.addEventListener('mouseup', () => {
      if (isResizing) {
        isResizing = false;
        resizeHandle.classList.remove('dragging');
      }
    });

    /* ─── Toast ─── */
    let toastTimer = null;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
    }

    /* ─── Default content ─── */
    function defaultContent() {
      return `# Welcome to Markdown Viewer ⚓

A **real-time** Markdown editor with live preview, built with plain HTML, CSS & JS.

---

## Features

- ✅ Live preview as you type
- 🌙 Dark / Light theme toggle
- 💾 Auto-save to localStorage
- 📄 Export to PDF
- 🔗 Copy rendered HTML
- 📥 Download \`.md\` file
- ⇅ Synchronized scrolling
- ↔️ Draggable split pane

---

## Formatting Examples

**Bold**, *italic*, ~~strikethrough~~, and \`inline code\`.

> "The sea is everything. It covers seven tenths of the terrestrial globe."
> — Jules Verne

### Code Block

\`\`\`javascript
function greet(name) {
  return \`Hello, \${name}! ⚓\`;
}
console.log(greet('World'));
\`\`\`

---

## Table

| Feature        | Status  | Notes                   |
|----------------|---------|-------------------------|
| Markdown render | ✅ Done | Uses marked.js          |
| Syntax highlight| ✅ Done | Uses highlight.js       |
| PDF export      | ✅ Done | Uses html2pdf.js        |
| Dark mode       | ✅ Done | Persisted in storage    |

---

## Lists

1. Edit Markdown on the **left**
2. See rendered preview on the **right**
3. Use the **toolbar** for quick formatting
4. Drag the **divider** to resize panes

---

*Happy writing! 🏴‍☠️*
`;
    }

  })();
  </script>
</body>
</html>
